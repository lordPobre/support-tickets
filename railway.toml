[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python manage.py migrate --run-syncdb && python manage.py seed_initial_data && python manage.py create_admin && python manage.py collectstatic --noinput && gunicorn support_system.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3