[build]
builder = "RAILPACK"

[deploy]
startCommand = "python manage.py migrate --run-syncdb && python manage.py seed_initial_data && python manage.py create_admin && python manage.py collectstatic --noinput && gunicorn support_system.wsgi --bind 0.0.0.0:$PORT --workers 2 --worker-class gthread --threads 4 --timeout 60 --keep-alive 5"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3